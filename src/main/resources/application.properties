# Porta padrão do servidor HTTP embutido do Quarkus
quarkus.http.port=8080

# Habilita o endpoint /q/health para verificar se o serviço está UP
quarkus.smallrye-health.ui.enable=false

# Serialização de LocalDateTime no formato ISO-8601 (ex: 2024-06-01T10:30:00)
quarkus.jackson.serialization.write-dates-as-timestamps=false
